name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write   # 👈 important for gh-pages deploy

jobs:
  cd:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auxkit

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          # Pages serves this repo at the root of the custom domain auxkit.dev.
          VITE_BASE_PUBLIC_PATH: ${{ secrets.VITE_BASE_PUBLIC_PATH || '/' }}
        run: bun run build

      - name: SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./auxkit/dist
          cname: auxkit.dev
